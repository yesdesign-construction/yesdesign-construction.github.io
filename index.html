<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>YES DESIGN & CONSTRUCTION | 프리미엄 인테리어</title>
    <style>
        /* 기본 스타일 초기화 */
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Malgun Gothic', sans-serif; line-height: 1.6; color: #333; background-color: #fff; transition: background 0.3s; }
        a { text-decoration: none; color: inherit; }

        /* 편집 모드 스타일 */
        .edit-mode [contenteditable="true"] {
            outline: 2px dashed #E8651E !important;
            background-color: rgba(232, 101, 30, 0.1) !important;
            padding: 2px 5px;
            border-radius: 4px;
        }

        /* 네비게이션 바 */
        header { position: fixed; top: 0; width: 100%; background-color: rgba(255, 255, 255, 0.95); display: flex; justify-content: space-between; align-items: center; padding: 1rem 5%; box-shadow: 0 1px 5px rgba(0,0,0,0.1); z-index: 1000; }
        .logo { display: flex; align-items: center; }
        .logo img { height: 50px; width: auto; object-fit: contain; }
        nav { display: flex; align-items: center; }
        nav .menu-item { margin-left: 2rem; font-weight: 600; color: #555; transition: color 0.3s; cursor: pointer; }
        nav .menu-item:hover { color: var(--point-color, #E8651E); }

        /* 메인 히어로 섹션 */
        .hero { height: 60vh; background-color: var(--main-bg-color, #E8651E); display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center; color: white; padding: 0 1rem; margin-top: 80px; }
        .hero h1 { font-size: 3rem; margin-bottom: 1rem; letter-spacing: 1px; }
        .hero p { font-size: 1.2rem; color: #fff; opacity: 0.9; }

        /* 공통 섹션 스타일 */
        section { padding: 5rem 10%; text-align: center; }
        section h2 { font-size: 2.2rem; color: var(--main-bg-color, #E8651E); margin-bottom: 1rem; position: relative; padding-bottom: 10px; }
        section h2::after { content: ''; position: absolute; bottom: 0; left: 50%; transform: translateX(-50%); width: 50px; height: 2px; background-color: var(--point-color, #E8651E); }
        .section-desc { color: #777; margin-bottom: 3rem; }

        /* 회사 소개 */
        .about-content { max-width: 800px; margin: 0 auto; font-size: 1.1rem; color: #555; line-height: 1.8; }

        /* 포트폴리오 섹션 */
        .portfolio-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 2rem; }
        .portfolio-item { background-color: #f9f9f9; border: 1px solid #eee; overflow: hidden; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .portfolio-img { width: 100%; height: 250px; background-color: #eaeaea; display: flex; align-items: center; justify-content: center; color: #888; font-weight: bold; font-size: 1.1rem; }
        .portfolio-info { padding: 1.5rem; text-align: left; }
        .portfolio-info h3 { font-size: 1.2rem; color: var(--main-bg-color, #E8651E); margin-bottom: 0.5rem; }
        .portfolio-info p { color: #777; font-size: 0.9rem; }

        /* 문의하기 폼 */
        .contact { background-color: #f4f6f8; }
        .contact-container { display: grid; grid-template-columns: 1fr 1fr; gap: 3rem; max-width: 1000px; margin: 0 auto; text-align: left; }
        .contact-info p { margin-bottom: 1rem; font-size: 1.1rem; }
        .contact-form { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        .form-group { margin-bottom: 1.2rem; }
        .form-group label { display: block; margin-bottom: 0.5rem; font-weight: bold; color: var(--main-bg-color, #E8651E); }
        .form-group input, .form-group textarea { width: 100%; padding: 0.8rem; border: 1px solid #ccc; border-radius: 4px; font-size: 1rem; }
        .submit-btn { width: 100%; padding: 1rem; background-color: var(--main-bg-color, #E8651E); color: white; border: none; border-radius: 4px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: background 0.3s; }
        .submit-btn:hover { background-color: #333; }

        /* 관리자 패널 */
        .admin-panel { display: none; position: fixed; bottom: 20px; right: 20px; background: #fff; border: 3px solid var(--point-color, #E8651E); padding: 1.5rem; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); z-index: 9999; max-width: 350px; }
        .admin-panel h3 { margin-bottom: 1rem; font-size: 1.1rem; color: #1a2a3a; border-bottom: 2px solid #333; padding-bottom: 5px; }
        .color-picker-group { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1rem; }
        .color-picker-group label { font-size: 0.9rem; font-weight: bold; }
        .color-picker-group input { cursor: pointer; width: 50px; height: 30px; border: none; }
        .admin-panel-btns { display: flex; gap: 10px; margin-top: 1rem; }
        .btn-save { background-color: #2ec4b6; color: white; padding: 10px; border: none; border-radius: 6px; cursor: pointer; flex: 1; font-weight: bold; text-align: center; }
        .btn-add-p { background-color: var(--main-bg-color, #E8651E); color: white; padding: 8px; border: none; border-radius: 4px; cursor: pointer; width: 100%; margin-top: 5px; font-size: 0.85rem; }
        .btn-danger { background-color: #d9534f; color: white; padding: 5px 10px; border: none; border-radius: 4px; cursor: pointer; font-size: 0.85rem; margin-top: 10px; width: 100%; text-align: center; }
        
        /* 모달창 */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 10000; justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 2rem; border-radius: 8px; width: 80%; max-width: 800px; max-height: 80vh; overflow-y: auto; text-align: left; }
        table { width: 100%; border-collapse: collapse; margin-top: 1rem; }
        th, td { padding: 10px; border: 1px solid #ddd; text-align: left; font-size: 0.9rem; }
        th { background-color: #E8651E; color: white; }
        .btn-table-del { background-color: #d9534f; color: white; padding: 3px 8px; border: none; border-radius: 4px; cursor: pointer; }

        footer {
